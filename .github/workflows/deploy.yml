name: music-deploy
on:
  push:
    branches: [main]

# Разрешаем экшену деплоить на GitHub Pages и генерировать токен безопасности
permissions:
  contents: read
  pages: write
  id-token: write

# Разрешаем только одну одновременно запущенную сборку для деплоя
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps: 
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # Обновлено до актуальной версии 24
          
      - run: npm install
      - run: npm run build
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          
      - id: deployment
        uses: actions/deploy-pages@v4
